name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
          - windows-latest
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.13t", "3.14", "3.14t"]
        include:
          - os: windows-11-arm
            python-version: "3.14"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # Strawberry Perl ships Python 3.9 that poisons the build.
      - name: Remove Strawberry Perl
        if: runner.os == 'Windows'
        run: Remove-Item C:\Strawberry -Recurse -Force -ErrorAction SilentlyContinue
      - name: Fetch test data
        run: git submodule update --init
      - name: Build PyOZ from source
        run: |
          git clone https://github.com/marselester/PyOZ.git
          cd PyOZ && zig build cli
      - name: Install dependencies
        run: pip install pytest
      - name: Build wheel
        shell: bash
        run: PyOZ/zig-out/bin/pyoz build
      - name: Run tests
        shell: bash
        run: |
          pip install dist/*.whl
          pytest -vs
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
